        /* === خفیہ بجلی کے نشانات === */
        body::before, body::after {
            content: "⚡";
            position: fixed;
            font-size: 120px;
            color: rgba(255, 215, 0, 0.08);
            pointer-events: none;
            z-index: -1;
            animation: lightningFlicker 4s infinite ease-in-out alternate;
        }
        body::before { top: 10%; left: 5%; }
        body::after { bottom: 20%; right: 5%; animation-delay: 2s; }
        @keyframes lightningFlicker {
            0% { opacity: 0.05; transform: scale(1) rotate(0deg); }
            50% { opacity: 0.15; transform: scale(1.1) rotate(10deg); }
            100% { opacity: 0.05; transform: scale(1) rotate(-5deg); }

            border-radius: 15px; 
            text-align: center; 
            margin-bottom: 15px; 
            position: relative; 
            overflow: hidden; 
        }
        .flag { 
            position: absolute; 
            top: 5px; 
            left: 5px; 
            width: 50px; 
            height: 30px; 
            background: linear-gradient(135deg, #01411c 50%, #ffffff 50%); 
            animation: wave 3s infinite ease-in-out; 
            border-radius: 5px; 
        }
        .flag::after {
            content: "☪";
            position: absolute;
            top: 50%;
            left: 55%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #fff;
        }
        @keyframes wave { 
            0% { transform: rotate(0deg); } 
            25% { transform: rotate(3deg); } 
            75% { transform: rotate(-3deg); } 
            100% { transform: rotate(0deg); } 
        }
        .header h1 { 
            color: #fff; 
            font-size: 24px; 
            text-shadow: 0 0 15px #00ffcc, 0 0 30px #00ffcc; 
            margin: 0; 
            font-weight: bold; 
            letter-spacing: 1px;

            border-radius: 10px;

            font-weight: bold;

            white-space: nowrap;

            font-size: 14px;

        /* === ایڈ جگہیں === */

        .ad-place-small { margin: 10px 0; min-height: 60px; background: #f9fafb; border-radius: 8px; padding: 8px; text-align: center; }
        
        .share-btn {

            cursor: pointer;

            bottom: 10px;

            max-width: 90%;

        if(appData.stickyAdCode) document.getElementById('stickyAd').style.display = 'block';
        
        updateCompanies();

    function updateCompanies() {
        const province = document.getElementById('provinceSelect').value;
        const companySelect = document.getElementById('companySelect');
        companySelect.innerHTML = '<option value="">-- منتخب کریں --</option>';
        if(!province) return;
        const filtered = appData.companies.filter(c => c.province === province);
        filtered.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.url;
            opt.innerText = c.name;
            companySelect.appendChild(opt);
        });
    }

    function checkBill() {
        const refNo = document.getElementById('refNo').value.trim();
        const consumerNo = document.getElementById('consumerNo').value.trim();
        const url = document.getElementById('companySelect').value;

        if(!url) {
            alert('براہِ کرم صوبہ اور کمپنی منتخب کریں');
            return;
        }

        if(!refNo && !consumerNo) {
            alert('فیلڈ خالی ہے، براہِ کرم نمبر درج کریں');
            return;
        }

        if(refNo && refNo.length < 5) {
            alert('نمبر کم ہے، براہِ کرم مکمل نمبر درج کریں');
            return;
        }
        if(consumerNo && consumerNo.length < 5) {
            alert('نمبر کم ہے، براہِ کرم مکمل نمبر درج کریں');
            return;
        }

        // انٹرسٹیشل ایڈ کے لیے سمارٹ لنک
        const overlay = document.getElementById('interstitialOverlay');
        const adBox = document.getElementById('interstitialAd');
        
        // اگر interstitialAdCode میں سمارٹ لنک موجود ہے تو اسے استعمال کریں
        if (appData.interstitialAdCode && appData.interstitialAdCode.trim() !== '') {
            adBox.innerHTML = appData.interstitialAdCode;
            document.getElementById('waitMsg').style.display = 'block';
            document.getElementById('skipBtn').style.display = 'none';
            overlay.style.display = 'flex';

            setTimeout(() => {
                document.getElementById('skipBtn').style.display = 'block';
                document.getElementById('waitMsg').style.display = 'none';
            }, 15000);
            
            window._billUrl = url;
        } else {
            // اگر کوڈ نہیں ہے تو براہِ راست بل کھولیں
            window.open(url, '_blank');
        }
    }

    function skipAd() {
        document.getElementById('interstitialOverlay').style.display = 'none';
        window.open(window._billUrl, '_blank');
    }

        });

                const msgDiv = btnElement.nextElementSibling;
                if(!value) {
                    msgDiv.innerText = '⚠️ Please enter a value';
                    msgDiv.style.color = 'red';
                    return;
                }
                appData[key] = value;
                const result = await saveData();
                if(result.success) {
                    msgDiv.innerText = '✅ Data saved successfully!';
                    msgDiv.style.color = 'green';
                } else {
                    msgDiv.innerText = '❌ Error: ' + result.error;
                    msgDiv.style.color = 'red';
                }
                setTimeout(() => { msgDiv.innerText = ''; }, 5000);
            }

            async function addCompany(btnElement) {
                const msgDiv = btnElement.nextElementSibling;
                const province = document.getElementById('newProvince').value;
                const name = document.getElementById('newCompanyName').value;
                const url = document.getElementById('newCompanyUrl').value;
                if(!name || !url) {
                    msgDiv.innerText = '⚠️ Name and URL are required';
                    msgDiv.style.color = 'red';
                    return;
                }
                appData.companies.push({ province, name, url });
                const result = await saveData();
                if(result.success) {
                    msgDiv.innerText = '✅ Company added successfully!';
                    msgDiv.style.color = 'green';
                    renderCompanyList();
                } else {
                    msgDiv.innerText = '❌ Error: ' + result.error;
                    msgDiv.style.color = 'red';
                }
                setTimeout(() => { msgDiv.innerText = ''; }, 5000);
            }

            async function deleteCompany(index, btnElement) {
                const msgDiv = btnElement.nextElementSibling;
                if(!confirm('Are you sure you want to delete this company?')) return;
                appData.companies.splice(index, 1);
                const result = await saveData();
                if(result.success) {
                    msgDiv.innerText = '✅ Company deleted!';
                    msgDiv.style.color = 'green';
                    renderCompanyList();
                } else {
                    msgDiv.innerText = '❌ Error: ' + result.error;
                    msgDiv.style.color = 'red';
                }
                setTimeout(() => { msgDiv.innerText = ''; }, 5000);
            }

            async function saveData() {
                try {
                    const res = await fetch('/save-data.js', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(appData)
                    });
                    if(res.ok) {
                        return { success: true };
                    } else {
                        const errorText = await res.text();
                        return { success: false, error: errorText };
                    }
                } catch(e) {
                    return { success: false, error: e.message };
                }
            }
        }
    </script>
</body>
</html>
