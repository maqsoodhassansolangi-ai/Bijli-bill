    <!-- Popunder Script (loads on click) -->
    <script>
        // Company data
        const companies = {
            punjab: [
                { name: 'MEPCO', url: 'https://bill.pitc.com.pk/mepcobill' },
                { name: 'LESCO', url: 'https://bill.pitc.com.pk/lescobill' },
                { name: 'FESCO', url: 'https://bill.pitc.com.pk/fescobill' },
                { name: 'GEPCO', url: 'https://bill.pitc.com.pk/gepcobill' },
                { name: 'IESCO', url: 'https://bill.pitc.com.pk/iescobill' },
                { name: 'KE', url: 'https://ke.com.pk/bills-e-payments/' }
            ],
            sindh: [
                { name: 'HESCO', url: 'https://bill.pitc.com.pk/hescobill' },
                { name: 'SEPCO', url: 'https://bill.pitc.com.pk/sepcobill' }
            ],
            kpk: [
                { name: 'PESCO', url: 'https://bill.pitc.com.pk/pescobill' },
                { name: 'Hazeco', url: 'https://bill.pitc.com.pk/hazecobill' }
            ],
            balochistan: [
                { name: 'TESCO', url: 'https://bill.pitc.com.pk/tescobill' },
                { name: 'QESCO', url: 'https://bill.pitc.com.pk/qescobill' }
            ]
        };

        document.getElementById('province').addEventListener('change', function() {
            const province = this.value;
            const companySelect = document.getElementById('company');
            companySelect.innerHTML = '<option value="">-- کمپنی منتخب کریں --</option>';
            if(province && companies[province]) {
                companies[province].forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.url;
                    opt.textContent = c.name;
                    companySelect.appendChild(opt);
                });
            }
        });

        function checkBill() {
            const province = document.getElementById('province').value;
            const company = document.getElementById('company').value;
            const ref = document.getElementById('refNo').value.trim();
            const consumer = document.getElementById('consumerNo').value.trim();

            if(!province || !company) {
                alert('براہِ کرم صوبہ اور کمپنی منتخب کریں!');
                return;
            }
            if(!ref && !consumer) {
                alert('براہِ کرم ریفرنس نمبر یا کنزیومر نمبر درج کریں!');
                return;
            }
            if((ref && ref.length < 5) || (consumer && consumer.length < 5)) {
                alert('نمبر کم از کم 5 ہندسوں کا ہونا چاہیے!');
                return;
            }

            // Popunder
            const popunderScript = document.createElement('script');
            popunderScript.innerHTML = `
                atOptions = {
                    'key' : '882d2c882ea1006b49c1131d05fe8c46',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                };
            `;
            document.body.appendChild(popunderScript);
            const popunderInvoke = document.createElement('script');
            popunderInvoke.src = 'https://recallscarce.com/882d2c882ea1006b49c1131d05fe8c46/invoke.js';
            document.body.appendChild(popunderInvoke);

            // Show loading message
            alert('براہِ کرم انتظار کریں، آپ کا بل چیک کیا جا رہا ہے۔');

            // Redirect to bill
            setTimeout(() => {
                window.open(company, '_blank');
            }, 500);
        }
    </script>
